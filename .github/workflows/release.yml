name: Release

on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository to clone (default: AmadeusITGroup/prompt-registry)'
        required: false
        default: 'AmadeusITGroup/prompt-registry'
      branch:
        description: 'Branch or tag to checkout (default: latest tag)'
        required: false
        default: ''
      test_mode:
        description: 'Test mode (skip release job)'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create release and tag (requires tag_name input)'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag name for release (required if create_release is true)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            node_arch: x64
          - os: ubuntu-latest
            platform: linux-arm64
            node_arch: arm64
          - os: macos-latest
            platform: darwin-amd64
            node_arch: x64
          - os: macos-latest
            platform: darwin-arm64
            node_arch: arm64
          - os: windows-latest
            platform: windows-amd64
            node_arch: x64
          - os: windows-latest
            platform: windows-arm64
            node_arch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone official repository
        shell: bash
        run: |
          REPO="${{ github.event.inputs.repo || 'AmadeusITGroup/prompt-registry' }}"
          git clone https://github.com/${REPO}.git prompt-registry
          cd prompt-registry
          
          if [ "${{ github.event_name }}" = "release" ]; then
            git checkout ${{ github.event.release.tag_name }}
          elif [ -n "${{ github.event.inputs.branch }}" ]; then
            git checkout "${{ github.event.inputs.branch }}"
          else
            git checkout main
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: prompt-registry
        run: pnpm install

      - name: Build CLI
        working-directory: prompt-registry
        run: pnpm --filter @prompt-registry/cli run build

      - name: Build SEA binary
        shell: bash
        working-directory: prompt-registry/packages/cli
        run: pnpm run build:sea:local

      - name: Rename binary to gh extension naming
        shell: bash
        working-directory: prompt-registry/packages/cli
        run: |
          cd dist
          # Find the generated binary (pattern: prompt-registry-<platform>-<arch>)
          for file in prompt-registry-*; do
            if [[ "${{ matrix.platform }}" == windows-* ]]; then
              if [[ "$file" == *.exe ]]; then
                mv "$file" "${{ matrix.platform }}.exe"
                mv "${file}.sha256" "${{ matrix.platform }}.exe.sha256"
              fi
            else
              if [[ ! "$file" == *.sha256 ]]; then
                mv "$file" "${{ matrix.platform }}"
                mv "${file}.sha256" "${{ matrix.platform }}.sha256"
              fi
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: prompt-registry/packages/cli/dist/${{ matrix.platform }}*

  release:
    needs: build-binaries
    if: ${{ github.event.inputs.create_release == 'true' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Generate combined checksums
        run: |
          cd dist
          # Generate checksums from subdirectories
          for dir in */; do
            for file in "${dir}"*; do
              if [ -f "$file" ]; then
                sha256sum "$file" >> SHA256SUMS.txt
              fi
            done
          done
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="test-${{ github.run_number }}"
          fi
          
          # Create release if it doesn't exist (for workflow_dispatch with create_release)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.create_release }}" = "true" ]; then
            if ! gh release view "$VERSION" > /dev/null 2>&1; then
              # Create tag if it doesn't exist
              if ! git tag -l "$VERSION" | grep -q "$VERSION"; then
                git tag "$VERSION"
                git push origin "$VERSION"
              fi
              # Create release
              gh release create "$VERSION" --title "Release $VERSION" --draft
            fi
          fi
          
          # Upload files from subdirectories
          find dist -type f -exec gh release upload "$VERSION" {} --clobber \;
          if [ "${{ github.event_name }}" = "release" ]; then
            gh release edit "$VERSION" --prerelease=false --latest
          fi
